user root;
worker_processes auto;

events {
    worker_connections 768;
    multi_accept on;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    ssl_protocols TLSv1 TLSv1.1 TLSv1.2; # Dropping SSLv3, ref: POODLE
    ssl_prefer_server_ciphers on;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    gzip on;

    upstream hermes-server {
        server hermes-master:10000;
    }

    upstream frp-server {
        server hermes-master;
    }

    server {
        listen 80 default_server;
        location / {
            return 404;
        }
    }

    server {
        listen 80;
        server_name yuusann.com;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 80;
        server_name www.yuusann.com;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 80;
        server_name blog.yuusann.com;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 80;
        server_name app.yuusann.com;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 80;
        server_name lab.yuusann.com;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 80;
        server_name deepbridge.yuusann.com;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 80;
        server_name mfund.yuusann.com;
        root /root/nginx/root;
        location /api/alipay/ {
            proxy_set_header watchdog-ip $remote_addr;
            proxy_set_header watchdog-port $remote_port;

            proxy_connect_timeout 10;
            proxy_send_timeout 10;
            proxy_read_timeout 3600;

            proxy_pass http://hermes-server;
        }

        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name yuusann.com www.yuusann.com;

        ssl_certificate /root/nginx/yuusann.com.cer;
        ssl_certificate_key /root/nginx/yuusann.com.key;

        location / {
            proxy_set_header watchdog-ip $remote_addr;
            proxy_set_header watchdog-port $remote_port;

            proxy_pass http://127.0.0.1:20000;
        }
    }

    server {
        listen 443 ssl;
        server_name blog.yuusann.com;

        ssl_certificate /root/nginx/yuusann.com.cer;
        ssl_certificate_key /root/nginx/yuusann.com.key;

        location / {
            proxy_set_header watchdog-ip $remote_addr;
            proxy_set_header watchdog-port $remote_port;

            proxy_pass http://127.0.0.1:20001;
        }
    }

    server {
        listen 443 ssl;
        server_name mfund.yuusann.com;

        ssl_certificate /root/nginx/yuusann.com.cer;
        ssl_certificate_key /root/nginx/yuusann.com.key;

        root /root/Hermes/Server/Workspace/HermesFrontDoor/root;

        location / {
            index index.html;
        }

        location /api/ {
            proxy_set_header watchdog-ip $remote_addr;
            proxy_set_header watchdog-port $remote_port;

            proxy_connect_timeout 10;
            proxy_send_timeout 10;
            proxy_read_timeout 30;

            if ($http_x_hermes_worker_override != "") {
                proxy_pass http://$http_x_hermes_worker_override;
                break;
            }

            proxy_pass http://hermes-server;
        }
    }

    server {
        listen 443 ssl;
        server_name app.yuusann.com;

        ssl_certificate /root/nginx/yuusann.com.cer;
        ssl_certificate_key /root/nginx/yuusann.com.key;

        location / {
            proxy_set_header watchdog-ip $remote_addr;
            proxy_set_header watchdog-port $remote_port;

            proxy_pass http://127.0.0.1:20002;
        }
    }

    server {
        listen 443 ssl;
        server_name lab.yuusann.com;

        ssl_certificate /root/nginx/yuusann.com.cer;
        ssl_certificate_key /root/nginx/yuusann.com.key;

        location / {
            proxy_set_header watchdog-ip $remote_addr;
            proxy_set_header watchdog-port $remote_port;

            proxy_pass http://127.0.0.1:20004;
        }
    }

    server {
        listen 443 ssl;
        server_name deepbridge.yuusann.com;

        ssl_certificate /root/nginx/yuusann.com.cer;
        ssl_certificate_key /root/nginx/yuusann.com.key;

        location / {
            proxy_set_header watchdog-ip $remote_addr;
            proxy_set_header watchdog-port $remote_port;

            proxy_pass http://127.0.0.1:20005;
        }
    }

    server {
        listen 80;
        server_name genshin.yuusann.com;
        root /root/nginx/root;
    }

    server {
        listen 443 ssl;

        server_name genshin.yuusann.com;

        ssl_certificate /root/nginx/yuusann.com.cer;
        ssl_certificate_key /root/nginx/yuusann.com.key;

        location / {
            proxy_pass https://127.0.0.1:22443;
        }
    }

    server {
        listen 80;
        server_name linkedin.yuusann.com;
        root /root/nginx/root;
    }

    server {
        listen 443 ssl;

        server_name linkedin.yuusann.com;

        ssl_certificate /root/nginx/yuusann.com.cer;
        ssl_certificate_key /root/nginx/yuusann.com.key;

        location / {
            root /root/nginx/root;
        }
    }
}