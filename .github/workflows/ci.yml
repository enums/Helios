name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: Lint (SwiftLint)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run SwiftLint
        uses: norio-nomura/action-swiftlint@3.2.1

  build-and-test:
    name: Build & Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-22.04 / Swift 5.9
            os: ubuntu-22.04
            swift-version: '5.9'
            setup-swift: true
          - name: macos-15 / Xcode default Swift
            os: macos-15
            setup-swift: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Swift
        if: ${{ matrix.setup-swift }}
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: ${{ matrix.swift-version }}

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build

      - name: Test
        run: swift test
